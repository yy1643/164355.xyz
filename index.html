<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>杨杪杪的个人主页</title>
    <!-- 引入 Remix Icon 图标库 -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 后台隐约的色彩微光，专为衬托毛玻璃质感 -->
    <div class="bg-glow-1"></div>
    <div class="bg-glow-2"></div>

    <!-- 主卡片 -->
    <div class="glass-card">
        
        <!-- 头像区域 -->
        <div class="avatar-container">
            <!-- 可以将 src 替换为你自己的个人头像链接 -->
            <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=200&q=80" alt="Avatar" class="avatar">
            <div class="status-dot"></div>
        </div>

        <!-- 个人信息 -->
        <h1 class="name">杨杪杪</h1>
        <p class="bio">求职意向：视频剪辑<br>保持渴望，保持谦卑。</p>

        <!-- 导航链接 -->
        <div class="links-container">
            
            <a href="portfolio.html" target="_blank" class="link-item">
                <div class="link-left">
                    <i class="ri-pages-line"></i>
                    <span>个人作品集 / Portfolio</span>
                </div>
                <i class="ri-arrow-right-s-line"></i>
            </a>

            <a href="#" class="link-item">
                <div class="link-left">
                    <i class="ri-github-fill"></i>
                    <span>开源主页 / GitHub</span>
                </div>
                <i class="ri-arrow-right-s-line"></i>
            </a>

            <a href="blog.html" target="_blank" class="link-item">
                <div class="link-left">
                    <i class="ri-bubble-chart-line"></i>
                    <span>一些想法 / Blog</span>
                </div>
                <i class="ri-arrow-right-s-line"></i>
            </a>

            <a href="contact.html" target="_blank" class="link-item">
                <div class="link-left">
                    <i class="ri-mail-open-line"></i>
                    <span>联系我 / Email</span>
                </div>
                <i class="ri-arrow-right-s-line"></i>
            </a>

        </div>

        <!-- 页脚 -->
        <p class="footer">© 2026 杨杪杪 </p>
        
    </div>

</body>
</html>
