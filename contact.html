<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系杨杪杪 / Contact</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="bg-glow-1"></div>
    <div class="bg-glow-2"></div>

    <div class="contact-container">

        <a href="index.html" class="back-btn">
            <i class="ri-arrow-left-s-line"></i> 返回主页
        </a>

        <div class="header">
            <h1>联系我</h1>
            <p>随时欢迎交流，探讨合作机会或分享有趣的想法。</p>
        </div>

        <div class="contact-card">

            <div class="social-info">
                <a href="mailto:1643558990@qq.com" class="social-item">
                    <i class="ri-mail-fill"></i>
                    <span>1643558990@qq.com</span>
                </a>
                <a href="tel:+8617774548253" class="social-item">
                    <i class="ri-phone-fill"></i>
                    <span>+86 17774548253</span>
                </a>
                <a href="#" class="social-item">
                    <i class="ri-wechat-fill"></i>
                    <span>WeChat: yy1643558990</span>
                </a>
            </div>

            <form class="contact-form" >
                <div class="form-group">
                    <label for="name">称呼</label>
                    <input type="text" id="name" class="form-control" placeholder="您的名字" required>
                </div>
                <div class="form-group">
                    <label for="email">联系邮箱</label>
                    <input type="email" id="email" class="form-control" placeholder="您的邮箱地址" required>
                </div>
                <div class="form-group">
                    <label for="message">内容</label>
                    <textarea id="message" class="form-control" placeholder="想对我说点什么..." required></textarea>
                </div>
                <button type="submit" class="submit-btn">发送消息</button>
            </form>

        </div>

    </div>

    <p class="footer">© 2026 杨杪杪. Designed with Apple Style.</p>

    <!-- 玻璃拟态 Toast 提示容器 -->
    <div id="toast" class="glass-toast">✓ 消息已发送！谢谢联系。</div>
    <script src="main.js"></script>
</body>
</html>
